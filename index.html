.eco-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:1.2rem}

.xstage:not(:last-child){border-right-color:transparent}

.xstage::after{content:'';position:absolute;inset:0;

.repo{border:1px solid rgba(14,165,233,0.22);
